name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Format, lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Format + lint
        run: bunx biome check src/ test/

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build binary
        run: bun build src/index.ts --compile --outfile claw-socket

  gitleaks:
    name: Secret scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
